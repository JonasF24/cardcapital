<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Capital - Trading Card Investment Platform</title>
    <link rel="icon" type="image/png" href="cardcapital-icon.png">
    <link rel="apple-touch-icon" href="cardcapital-icon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(to bottom right, #0f172a, #1e293b, #0f172a);
        }
        
        .glass-effect {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.5);
        }
        
        .metric-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .metric-card:hover {
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }

        .chart-container {
            background: #0f172a;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid rgba(71, 85, 105, 0.3);
        }

        .market-tab {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .market-tab.active {
            color: white;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .market-tab:not(.active) {
            background: #334155;
            color: #cbd5e1;
        }

        .market-tab:not(.active):hover {
            background: #475569;
        }

        .spinner {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .alert-box {
            border-radius: 8px;
            padding: 16px;
            border: 1px solid;
        }

        .alert-amber {
            background: rgba(180, 83, 9, 0.1);
            border-color: rgba(180, 83, 9, 0.5);
        }

        .alert-green {
            background: rgba(20, 83, 45, 0.1);
            border-color: rgba(20, 83, 45, 0.5);
        }

        .alert-blue {
            background: rgba(12, 74, 110, 0.1);
            border-color: rgba(12, 74, 110, 0.5);
        }

        .progress-bar {
            background: #334155;
            border-radius: 9999px;
            height: 6px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(to right, #3b82f6, #a855f7);
            height: 100%;
            border-radius: 9999px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        const e = React.createElement;

        function CardTrackerDashboard() {
            const [selectedMarket, setSelectedMarket] = React.useState('pokemon');
            const [viewMode, setViewMode] = React.useState('grid');
            const [searchQuery, setSearchQuery] = React.useState('');
            const [timeframe, setTimeframe] = React.useState('30d');
            const [lastUpdate, setLastUpdate] = React.useState(new Date());

            React.useEffect(() => {
                const interval = setInterval(() => setLastUpdate(new Date()), 60000);
                return () => clearInterval(interval);
            }, []);

            const markets = {
                sports: [
                    { id: 'mlb', name: 'MLB Baseball', icon: '⚾', color: '#EF4444', trend: 5.2 },
                    { id: 'nba', name: 'NBA Basketball', icon: '🏀', color: '#3B82F6', trend: -2.1 },
                    { id: 'nfl', name: 'NFL Football', icon: '🏈', color: '#1F2937', trend: 8.3 },
                    { id: 'nhl', name: 'NHL Hockey', icon: '🏒', color: '#06B6D4', trend: 3.7 }
                ],
                tcg: [
                    { id: 'pokemon', name: 'Pokémon', icon: '🟡', color: '#FBBF24', trend: 12.4 },
                    { id: 'yugioh', name: 'Yu-Gi-Oh!', icon: '🔷', color: '#A78BFA', trend: -1.3 },
                    { id: 'onepiece', name: 'One Piece', icon: '🔴', color: '#F87171', trend: 15.8 },
                    { id: 'mtg', name: 'Magic: The Gathering', icon: '🎴', color: '#10B981', trend: 6.9 }
                ]
            };

            // Seeded pseudo-random so chart data is stable for a given market+timeframe
            const seededRng = (seed) => {
                let s = seed;
                return () => {
                    s = (s * 1664525 + 1013904223) & 0xffffffff;
                    return (s >>> 0) / 0x100000000;
                };
            };

            const chartData = React.useMemo(() => {
                const days = timeframe === '7d' ? 7 : timeframe === '30d' ? 30 : 90;
                const data = [];
                const basePrice = { pokemon: 450, yugioh: 320, onepiece: 280, mtg: 380, mlb: 520, nba: 480, nfl: 650, nhl: 410 };
                const base = basePrice[selectedMarket] || 400;
                // Use a deterministic seed derived from market + timeframe so the
                // chart is stable while the same market/timeframe is displayed.
                const marketSeed = selectedMarket.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
                const rng = seededRng(marketSeed * days);
                for (let i = -days; i <= 0; i++) {
                    const volatility = Math.sin(i / 10) * 20 + (rng() - 0.5) * 40;
                    data.push({
                        date: new Date(Date.now() + i * 24 * 60 * 60 * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
                        price: Math.round(base + volatility),
                        volume: Math.floor(1200 + rng() * 2800),
                        graded: Math.floor(300 + rng() * 800)
                    });
                }
                return data;
            }, [selectedMarket, timeframe]);

            const portfolioData = [
                { market: 'pokemon', cards: 145, value: 68420, change: 12.4, topCard: 'Charizard PSA 9' },
                { market: 'mtg', cards: 89, value: 45230, change: 6.9, topCard: 'Black Lotus Alpha' },
                { market: 'nba', cards: 234, value: 52100, change: -2.1, topCard: 'LeBron Rookie RC' },
                { market: 'onepiece', cards: 67, value: 22340, change: 15.8, topCard: 'Luffy Boa SR' }
            ];

            const totalPortfolioValue = portfolioData.reduce((sum, item) => sum + item.value, 0);
            const portfolioChange = ((portfolioData.reduce((sum, item) => sum + (item.value * item.change / 100), 0)) / totalPortfolioValue * 100).toFixed(1);

            const marketData = [...markets.sports, ...markets.tcg].find(m => m.id === selectedMarket);
            const marketMetrics = {
                avgPrice: Math.round(chartData.reduce((sum, d) => sum + d.price, 0) / chartData.length),
                highPrice: Math.max(...chartData.map(d => d.price)),
                lowPrice: Math.min(...chartData.map(d => d.price)),
                totalVolume: chartData.reduce((sum, d) => sum + d.volume, 0),
                gradedCards: chartData[chartData.length - 1].graded
            };

            const marketBreakdown = [
                { name: 'Sports Cards', value: 117000, pct: 45 },
                { name: 'Pokémon', value: 68420, pct: 26 },
                { name: 'MTG', value: 45230, pct: 17 },
                { name: 'Other TCG', value: 28640, pct: 12 }
            ];

            // Compute market volatility (coefficient of variation) from chart data
            const priceMean = chartData.reduce((sum, d) => sum + d.price, 0) / chartData.length;
            const priceVariance = chartData.reduce((sum, d) => sum + Math.pow(d.price - priceMean, 2), 0) / chartData.length;
            const computedVolatility = (Math.sqrt(priceVariance) / priceMean * 100).toFixed(1);

            // Build SVG paths for charts
            const svgXL = 45, svgXR = 790, svgYT = 15, svgYB = 225;
            const buildPricePath = (data, key) => {
                const vals = data.map(d => d[key]);
                const minV = Math.min(...vals), maxV = Math.max(...vals);
                const pad = (maxV - minV) * 0.1 || 5;
                const lo = minV - pad, hi = maxV + pad, rangeV = hi - lo;
                const pts = data.map((d, i) => ({
                    x: svgXL + (i / (data.length - 1)) * (svgXR - svgXL),
                    y: svgYB - ((d[key] - lo) / rangeV) * (svgYB - svgYT),
                    val: d[key], date: d.date
                }));
                const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
                const area = line + ` L ${pts[pts.length - 1].x.toFixed(1)},${svgYB} L ${pts[0].x.toFixed(1)},${svgYB} Z`;
                const yLabels = [0, 0.25, 0.5, 0.75, 1].map(pct => ({
                    val: Math.round(lo + pct * rangeV), y: svgYB - pct * (svgYB - svgYT)
                }));
                return { pts, line, area, yLabels };
            };

            const priceChart = buildPricePath(chartData, 'price');
            const gradedChart = buildPricePath(chartData, 'graded');
            const maxVol = Math.max(...chartData.map(d => d.volume));
            const dateStep = Math.max(1, Math.floor((chartData.length - 1) / 5));

            // Dynamic alerts derived from actual market data
            const allMarkets = [...markets.sports, ...markets.tcg];
            const topVolatileMarket = allMarkets.reduce((a, b) => Math.abs(b.trend) > Math.abs(a.trend) ? b : a);
            const bestPerformer = allMarkets.reduce((a, b) => b.trend > a.trend ? b : a);

            return e('div', { className: 'min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900' },
                // Header
                e('div', { className: 'sticky top-0 z-40 border-b border-slate-700 glass-effect' },
                    e('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4' },
                        e('div', { className: 'flex items-center justify-between mb-4' },
                            e('div', { className: 'flex items-center gap-3' },
                                e('img', {
                                    src: 'cardcapital-icon.png',
                                    alt: 'Card Capital Icon',
                                    className: 'w-10 h-10 rounded-lg object-contain sm:hidden',
                                    onError: (event) => { event.currentTarget.style.display = 'none'; }
                                }),
                                e('img', {
                                    src: 'cardcapital-logo.png',
                                    alt: 'Card Capital - Trading Card Investing',
                                    className: 'hidden sm:block h-12 w-auto object-contain',
                                    onError: (event) => { event.currentTarget.style.display = 'none'; }
                                }),
                                e('div', { className: 'flex flex-col sm:hidden' },
                                    e('h1', { className: 'text-2xl font-bold text-white leading-tight' }, 'Card Capital'),
                                    e('span', { className: 'text-blue-300 text-xs font-semibold tracking-wide' }, 'Trading Card Investing')
                                )
                            ),
                            e('div', { className: 'flex items-center gap-2 text-xs text-slate-400' },
                                e('svg', { className: 'spinner w-4 h-4', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    e('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15' })
                                ),
                                e('span', null, `Last updated: ${lastUpdate.toLocaleTimeString()}`)
                            )
                        ),
                        // Search bar
                        e('div', { className: 'flex flex-col sm:flex-row gap-3 items-center' },
                            e('div', { className: 'flex-1 relative' },
                                e('svg', { className: 'absolute left-3 top-1/2 -translate-y-1/2 text-slate-500', width: 18, height: 18, fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    e('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' })
                                ),
                                e('input', {
                                    type: 'text',
                                    placeholder: 'Search cards, sets, graders...',
                                    className: 'w-full pl-10 pr-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500',
                                    value: searchQuery,
                                    onChange: (e) => setSearchQuery(e.target.value)
                                })
                            )
                        )
                    )
                ),

                // Main Content
                e('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8' },
                    // Portfolio Overview Cards
                    e('div', { className: 'grid grid-cols-1 md:grid-cols-4 gap-4 mb-8' },
                        e('div', { className: 'col-span-1 md:col-span-2 metric-card' },
                            e('h3', { className: 'text-slate-400 text-sm font-semibold mb-2' }, 'Total Portfolio Value'),
                            e('p', { className: 'text-4xl font-bold text-white mb-1' }, `$${(totalPortfolioValue / 1000).toFixed(0)}K`),
                            e('p', { className: `text-sm font-semibold ${portfolioChange > 0 ? 'text-green-400' : 'text-red-400'}` },
                                portfolioChange > 0 ? '📈' : '📉',
                                ` ${portfolioChange > 0 ? '+' : ''}${portfolioChange}% this month`
                            )
                        ),
                        e('div', { className: 'metric-card' },
                            e('h3', { className: 'text-slate-400 text-sm font-semibold mb-2' }, 'Cards in Collection'),
                            e('p', { className: 'text-3xl font-bold text-white' }, portfolioData.reduce((sum, item) => sum + item.cards, 0)),
                            e('p', { className: 'text-xs text-slate-400 mt-1' }, 'across 4 markets')
                        ),
                        e('div', { className: 'metric-card' },
                            e('h3', { className: 'text-slate-400 text-sm font-semibold mb-2' }, 'Market Volatility'),
                            e('p', { className: 'text-3xl font-bold text-white' }, `${computedVolatility}%`),
                            e('p', { className: 'text-xs text-slate-400 mt-1' }, `${timeframe} average`)
                        )
                    ),

                    // Market Tabs - Sports
                    e('div', { className: 'mb-8' },
                        e('div', { className: 'flex gap-2 mb-4' },
                            e('span', { className: 'text-sm font-semibold text-slate-300' }, 'Sports Cards'),
                            e('div', { className: 'flex gap-2 flex-wrap' },
                                markets.sports.map(market =>
                                    e('button', {
                                        key: market.id,
                                        onClick: () => setSelectedMarket(market.id),
                                        className: `market-tab ${selectedMarket === market.id ? 'active' : ''}`,
                                        style: selectedMarket === market.id ? { backgroundColor: market.color } : {}
                                    }, `${market.icon} ${market.name}`)
                                )
                            )
                        ),
                        // Market Tabs - TCG
                        e('div', { className: 'flex gap-2' },
                            e('span', { className: 'text-sm font-semibold text-slate-300' }, 'Trading Card Games'),
                            e('div', { className: 'flex gap-2 flex-wrap' },
                                markets.tcg.map(market =>
                                    e('button', {
                                        key: market.id,
                                        onClick: () => setSelectedMarket(market.id),
                                        className: `market-tab ${selectedMarket === market.id ? 'active' : ''}`,
                                        style: selectedMarket === market.id ? { backgroundColor: market.color } : {}
                                    }, `${market.icon} ${market.name}`)
                                )
                            )
                        )
                    ),

                    // Market Detail Section
                    e('div', { className: 'bg-slate-800 rounded-xl border border-slate-600 p-6 mb-8' },
                        e('div', { className: 'flex items-start justify-between mb-6' },
                            e('div', null,
                                e('h2', { className: 'text-2xl font-bold text-white mb-2' }, `${marketData.name} Market`),
                                e('div', { className: 'flex gap-6 text-sm' },
                                    e('div', null,
                                        e('span', { className: 'text-slate-400' }, 'Avg Price: '),
                                        e('span', { className: 'text-white font-semibold' }, `$${marketMetrics.avgPrice}`)
                                    ),
                                    e('div', null,
                                        e('span', { className: 'text-slate-400' }, 'Range: '),
                                        e('span', { className: 'text-white font-semibold' }, `$${marketMetrics.lowPrice} - $${marketMetrics.highPrice}`)
                                    ),
                                    e('div', null,
                                        e('span', { className: 'text-slate-400' }, 'Graded Cards: '),
                                        e('span', { className: 'text-white font-semibold' }, marketMetrics.gradedCards.toLocaleString())
                                    )
                                )
                            ),
                            e('div', { className: `text-xl font-bold ${marketData.trend > 0 ? 'text-green-400' : 'text-red-400'}` },
                                marketData.trend > 0 ? '📈' : '📉',
                                ` ${marketData.trend > 0 ? '+' : ''}${marketData.trend}%`
                            )
                        ),

                        // Timeframe Buttons
                        e('div', { className: 'flex gap-2 mb-6' },
                            ['7d', '30d', '90d'].map(tf =>
                                e('button', {
                                    key: tf,
                                    onClick: () => setTimeframe(tf),
                                    className: `px-4 py-2 rounded-lg text-sm font-medium transition ${
                                        timeframe === tf
                                            ? 'bg-blue-600 text-white'
                                            : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                    }`
                                }, tf === '7d' ? '7 Days' : tf === '30d' ? '30 Days' : '90 Days')
                            )
                        ),

                        // Price Chart
                        e('div', { className: 'chart-container mb-6' },
                            e('h3', { className: 'text-white font-semibold mb-4' }, 'Price Trend'),
                            e('svg', { className: 'w-full', viewBox: '0 0 835 255', style: { height: '220px' } },
                                e('defs', null,
                                    e('linearGradient', { id: 'priceGradient', x1: '0%', y1: '0%', x2: '0%', y2: '100%' },
                                        e('stop', { offset: '0%', stopColor: marketData.color, stopOpacity: 0.3 }),
                                        e('stop', { offset: '100%', stopColor: marketData.color, stopOpacity: 0 })
                                    )
                                ),
                                // Grid lines
                                priceChart.yLabels.map((lbl, i) =>
                                    e('g', { key: i },
                                        e('line', { x1: svgXL, y1: lbl.y.toFixed(1), x2: svgXR, y2: lbl.y.toFixed(1), stroke: '#334155', strokeDasharray: '4' }),
                                        e('text', { x: svgXL - 5, y: (lbl.y + 4).toFixed(1), fill: '#94A3B8', fontSize: 10, textAnchor: 'end' }, `$${lbl.val}`)
                                    )
                                ),
                                // X axis date labels
                                chartData.map((d, i) => {
                                    if (i % dateStep !== 0 && i !== chartData.length - 1) return null;
                                    const x = svgXL + (i / (chartData.length - 1)) * (svgXR - svgXL);
                                    return e('text', { key: i, x: x.toFixed(1), y: svgYB + 18, fill: '#94A3B8', fontSize: 10, textAnchor: 'middle' }, d.date);
                                }),
                                // Area fill
                                e('path', { d: priceChart.area, fill: 'url(#priceGradient)' }),
                                // Price line
                                e('path', { d: priceChart.line, stroke: marketData.color, strokeWidth: 2.5, fill: 'none' }),
                                // Axes
                                e('line', { x1: svgXL, y1: svgYB, x2: svgXR, y2: svgYB, stroke: '#475569', strokeWidth: 1.5 }),
                                e('line', { x1: svgXL, y1: svgYT, x2: svgXL, y2: svgYB, stroke: '#475569', strokeWidth: 1.5 })
                            )
                        ),

                        // Volume and Graded Cards
                        e('div', { className: 'grid grid-cols-2 gap-4' },
                            e('div', { className: 'chart-container' },
                                e('h3', { className: 'text-white font-semibold mb-4' }, 'Trading Volume'),
                                e('svg', { className: 'w-full', viewBox: '0 0 835 200', style: { height: '160px' } },
                                    chartData.map((d, i) => {
                                        const barW = Math.max(2, (svgXR - svgXL) / chartData.length * 0.75);
                                        const x = svgXL + (i / (chartData.length - 1)) * (svgXR - svgXL);
                                        const h = (d.volume / maxVol) * (svgYB - svgYT - 5);
                                        return e('rect', {
                                            key: i, x: (x - barW / 2).toFixed(1), y: (svgYB - h).toFixed(1),
                                            width: barW.toFixed(1), height: h.toFixed(1),
                                            fill: marketData.color, opacity: 0.7
                                        });
                                    }),
                                    e('line', { x1: svgXL, y1: svgYB, x2: svgXR, y2: svgYB, stroke: '#475569', strokeWidth: 1.5 }),
                                    e('line', { x1: svgXL, y1: svgYT, x2: svgXL, y2: svgYB, stroke: '#475569', strokeWidth: 1.5 })
                                )
                            ),
                            e('div', { className: 'chart-container' },
                                e('h3', { className: 'text-white font-semibold mb-4' }, 'Graded Cards Listed'),
                                e('svg', { className: 'w-full', viewBox: '0 0 835 200', style: { height: '160px' } },
                                    e('defs', null,
                                        e('linearGradient', { id: 'gradedGradient', x1: '0%', y1: '0%', x2: '0%', y2: '100%' },
                                            e('stop', { offset: '0%', stopColor: marketData.color, stopOpacity: 0.15 }),
                                            e('stop', { offset: '100%', stopColor: marketData.color, stopOpacity: 0 })
                                        )
                                    ),
                                    e('path', { d: gradedChart.area, fill: 'url(#gradedGradient)' }),
                                    e('path', { d: gradedChart.line, stroke: marketData.color, strokeWidth: 2, fill: 'none' }),
                                    e('line', { x1: svgXL, y1: svgYB, x2: svgXR, y2: svgYB, stroke: '#475569', strokeWidth: 1.5 }),
                                    e('line', { x1: svgXL, y1: svgYT, x2: svgXL, y2: svgYB, stroke: '#475569', strokeWidth: 1.5 })
                                )
                            )
                        )
                    ),

                    // Portfolio Holdings
                    e('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8' },
                        e('div', { className: 'bg-slate-800 rounded-xl border border-slate-600 p-6' },
                            e('h3', { className: 'text-lg font-bold text-white mb-6' }, 'Portfolio by Market'),
                            e('div', { className: 'space-y-4' },
                                marketBreakdown.map((item, idx) => {
                                    const colors = ['#EF4444', '#FBBF24', '#10B981', '#3B82F6'];
                                    return e('div', { key: idx, className: 'flex items-center gap-3' },
                                        e('div', {
                                            className: 'w-3 h-3 rounded-full',
                                            style: { backgroundColor: colors[idx] }
                                        }),
                                        e('span', { className: 'text-slate-300 text-sm flex-1' }, `${item.name} (${item.pct}%)`),
                                        e('span', { className: 'text-white font-semibold text-sm' }, `$${(item.value / 1000).toFixed(0)}K`)
                                    );
                                })
                            )
                        ),

                        e('div', { className: 'bg-slate-800 rounded-xl border border-slate-600 p-6' },
                            e('h3', { className: 'text-lg font-bold text-white mb-4' }, 'Holdings by Market'),
                            e('div', { className: 'space-y-3' },
                                portfolioData.map((item, idx) =>
                                    e('div', { key: idx, className: 'bg-slate-700 rounded-lg p-4' },
                                        e('div', { className: 'flex justify-between items-start mb-2' },
                                            e('div', null,
                                                e('p', { className: 'text-white font-semibold capitalize' }, item.market),
                                                e('p', { className: 'text-sm text-slate-400' }, `${item.cards} cards`)
                                            ),
                                            e('div', { className: 'text-right' },
                                                e('p', { className: 'text-white font-semibold' }, `$${item.value.toLocaleString()}`),
                                                e('p', { className: `text-sm font-semibold ${item.change > 0 ? 'text-green-400' : 'text-red-400'}` },
                                                    `${item.change > 0 ? '+' : ''}${item.change}%`
                                                )
                                            )
                                        ),
                                        e('p', { className: 'text-xs text-slate-400 mb-2' }, `Top: ${item.topCard}`),
                                        e('div', { className: 'progress-bar' },
                                            e('div', {
                                                className: 'progress-fill',
                                                style: { width: `${(item.value / totalPortfolioValue) * 100}%` }
                                            })
                                        )
                                    )
                                )
                            )
                        )
                    ),

                    // Market Alerts
                    e('div', { className: 'bg-slate-800 rounded-xl border border-slate-600 p-6' },
                        e('div', { className: 'flex items-center gap-2 mb-4' },
                            e('svg', { className: 'w-5 h-5 text-amber-400', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                e('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' })
                            ),
                            e('h3', { className: 'text-lg font-bold text-white' }, 'Market Alerts & Insights')
                        ),
                        e('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4' },
                            e('div', { className: 'alert-box alert-amber' },
                                e('p', { className: 'text-amber-200 text-sm font-semibold mb-1' }, '⚡ High Volatility Detected'),
                                e('p', { className: 'text-amber-100 text-xs' },
                                    `${topVolatileMarket.name} market showing ${topVolatileMarket.trend > 0 ? '+' : ''}${topVolatileMarket.trend}% trend — monitor closely.`
                                )
                            ),
                            e('div', { className: 'alert-box alert-green' },
                                e('p', { className: 'text-green-200 text-sm font-semibold mb-1' }, '✓ Strong Performer'),
                                e('p', { className: 'text-green-100 text-xs' },
                                    `${bestPerformer.name} is the top-trending market at ${bestPerformer.trend > 0 ? '+' : ''}${bestPerformer.trend}% over the selected period.`
                                )
                            ),
                            e('div', { className: 'alert-box alert-blue' },
                                e('p', { className: 'text-blue-200 text-sm font-semibold mb-1' }, 'ℹ Last Updated'),
                                e('p', { className: 'text-blue-100 text-xs' },
                                    `Data last refreshed at ${lastUpdate.toLocaleTimeString()}. Page auto-refreshes the timestamp every minute.`
                                )
                            )
                        )
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(CardTrackerDashboard)
        );
    </script>
</body>
</html>
